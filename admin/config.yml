backend:
  name: github
  repo: bishal25th-cpu/porcms    # ← Change this to your GitHub username/repo
  branch: main

# Stores all content as JSON files in /public/data/
# Images are uploaded to /public/images/gallery/
media_folder: "public/images/gallery"
public_folder: "/images/gallery"

# The admin panel URL will be: https://porcms.bishal25th.workers.dev/admin
site_url: https://porcms.bishal25th.workers.dev

collections:

  # ─────────────────────────────────────────────
  # 1. BLOG POSTS (Bichaar Archive)
  #    Each post saved as /public/data/blog/[slug].json
  #    An index file /public/data/blog/index.json is auto-managed
  # ─────────────────────────────────────────────
  - name: "blog"
    label: "Blog Posts (Bichaar)"
    label_singular: "Blog Post"
    folder: "public/data/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "title"
    summary: "{{title}} — {{date}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The blog post headline. Keep it sharp."

      - label: "Date"
        name: "date"
        widget: "string"
        hint: "Display date shown on the card and modal. Example: June 2026"
        default: "June 2026"

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Optional short summary shown on the blog card (max 160 characters). If left empty, it is auto-generated from the content."

      - label: "Content"
        name: "content"
        widget: "markdown"
        hint: "The full blog post. Supports headings, bold, italic, paragraphs."

  # ─────────────────────────────────────────────
  # 2. QUOTES (The Thinker section on home page)
  #    Saved as a single file /public/data/quotes.json
  #    with a list of { text, author } objects
  # ─────────────────────────────────────────────
  - name: "quotes"
    label: "Quotes (Thinker Section)"
    files:
      - label: "All Quotes"
        name: "all_quotes"
        file: "public/data/quotes.json"
        fields:
          - label: "Quotes"
            name: "quotes"
            widget: "list"
            label_singular: "Quote"
            summary: "{{fields.text}} — {{fields.author}}"
            fields:
              - label: "Quote Text"
                name: "text"
                widget: "text"
                hint: "The quote itself. Do not add quotation marks — they are added automatically."

              - label: "Author"
                name: "author"
                widget: "string"
                hint: "The person who said it. Example: Carl Jung"

  # ─────────────────────────────────────────────
  # 3. GALLERY (The Explorer horizontal scroll)
  #    Saved as /public/data/gallery.json
  #    Images are uploaded to /public/images/gallery/
  # ─────────────────────────────────────────────
  - name: "gallery"
    label: "Gallery (Explorer Section)"
    files:
      - label: "Gallery Images"
        name: "gallery_images"
        file: "public/data/gallery.json"
        fields:
          - label: "Images"
            name: "images"
            widget: "list"
            label_singular: "Image"
            summary: "{{fields.image}}"
            field:
              label: "Image"
              name: "image"
              widget: "image"
              hint: "Upload a photo. Recommended size: square, at least 800x800px. WebP or JPG preferred."
